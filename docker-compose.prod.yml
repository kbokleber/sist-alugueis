# Produção — Coolify (Docker Compose).
# Domínio público: frontend (porta 80). API same-origin via /api/* no Nginx.
# Domínio alugueis-api.*: opcional, só para integrações externas (ex.: Hermes).
# Não use container_name fixo: o Coolify gera nomes por release e conflitos causam 504.
#
# IMPORTANTE: NÃO declarar rede custom aqui.
# Quando o container está em múltiplas redes, o Traefik do Coolify escolhe
# uma rede não-deterministicamente e pode rotear por uma rede que ele não
# alcança, causando 504 Gateway Timeout. Coolify já injeta sua própria rede.
# Ref: https://github.com/coollabsio/coolify/issues/6215

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sist_alugueis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sist_alugueis}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sist_alugueis} -d ${POSTGRES_DB:-sist_alugueis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 45s
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sist_alugueis}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sist_alugueis}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      DATABASE_POOL_RECYCLE: ${DATABASE_POOL_RECYCLE:-1800}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
      GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-1000}
      GUNICORN_MAX_REQUESTS_JITTER: ${GUNICORN_MAX_REQUESTS_JITTER:-100}
      RUN_SEED: ${RUN_SEED:-false}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
        COMMIT_SHA: ${COMMIT_SHA:-}
    restart: unless-stopped
    stop_grace_period: 15s
    environment:
      # Coolify injeta SERVICE_NAME_BACKEND (ex.: backend-i2a5...). Entrypoint resolve o upstream.
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-}
      SERVICE_NAME_BACKEND: ${SERVICE_NAME_BACKEND:-backend}
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Valida SPA + conectividade com a API (não só arquivos estáticos).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health/api"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata_prod:
