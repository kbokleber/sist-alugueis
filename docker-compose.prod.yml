version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sist_alugueis_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sist_alugueis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sist_alugueis}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sist_alugueis}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sist_alugueis_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sist_alugueis_backend_prod
    restart: always
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sist_alugueis}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sist_alugueis}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/seed_data.py && 
      gunicorn app.main:app --workers 4 --bind 0.0.0.0:8000 -k uvicorn.workers.UvicornWorker"
    networks:
      - sist_alugueis_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_APP_NAME: ${VITE_APP_NAME:-Sistema de Aluguéis}
    container_name: sist_alugueis_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - sist_alugueis_network

volumes:
  pgdata_prod:

networks:
  sist_alugueis_network:
    driver: bridge
